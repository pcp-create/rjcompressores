<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apresentação Power BI</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000; /* evita flash branco do navegador */
    }

    .frame {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      opacity: 0;
      transition: opacity 500ms ease; /* fade */
      will-change: opacity;
    }

    .frame.visible {
      opacity: 1;
    }

    /* Overlay de status (contador) - CANTO SUPERIOR DIREITO */
    .hud {
      position: fixed;
      right: 12px;
      top: 12px;              /* <- aqui fica no canto superior direito */
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font: 14px/1.2 Arial, sans-serif;
      z-index: 9999;
      user-select: none;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }

    .hud b { font-size: 15px; }
    .hud small { opacity: 0.85; display: block; margin-top: 4px; }
  </style>
</head>

<body>
  <!-- Dois iframes para pré-carregar -->
  <iframe id="frameA" class="frame"></iframe>
  <iframe id="frameB" class="frame"></iframe>

  <!-- Contador/Status -->
  <div class="hud" id="hud">
    <b>Tela: --/--</b>
    <small>Troca em: --s</small>
  </div>

  <script>
    const links = [
      "https://app.powerbi.com/view?r=eyJrIjoiNDYzMTJhYjYtNjY2OS00MjVhLWJkMTctOWY2N2VmNzY0NzJiIiwidCI6ImZiMmI1MzQ5LTU5MjYtNDU4ZC1iYzA3LTMwZjYxMDhjMjc2OSJ9&pageName=e86f54466316cddd7698", // Apontamento Diário
      "https://app.powerbi.com/view?r=eyJrIjoiN2UyZWNhNjQtZTBlZi00MjY3LWE0ZDgtZTE3ZjAzZGZmYWFkIiwidCI6ImZiMmI1MzQ5LTU5MjYtNDU4ZC1iYzA3LTMwZjYxMDhjMjc2OSJ9&pageName=ac7b003b1fa46438942e", // Campanha de Vendas
      "https://app.powerbi.com/view?r=eyJrIjoiNDYzMTJhYjYtNjY2OS00MjVhLWJkMTctOWY2N2VmNzY0NzJiIiwidCI6ImZiMmI1MzQ5LTU5MjYtNDU4ZC1iYzA3LTMwZjYxMDhjMjc2OSJ9&pageName=53332aa630968e73753f", // Oficina RJ
      "https://app.powerbi.com/view?r=eyJrIjoiNDYzMTJhYjYtNjY2OS00MjVhLWJkMTctOWY2N2VmNzY0NzJiIiwidCI6ImZiMmI1MzQ5LTU5MjYtNDU4ZC1iYzA3LTMwZjYxMDhjMjc2OSJ9&pageName=753271c12a0a91e3109e", // Linha Pro
      "https://app.powerbi.com/view?r=eyJrIjoiNDYzMTJhYjYtNjY2OS00MjVhLWJkMTctOWY2N2VmNzY0NzJiIiwidCI6ImZiMmI1MzQ5LTU5MjYtNDU4ZC1iYzA3LTMwZjYxMDhjMjc2OSJ9&pageName=49750493aeb10692c370" // Externo RJ
    ];

    const INTERVAL_MS = 180000;     // 3 minuto
    const FADE_MS = 500;           // igual ao CSS
    const LOAD_TIMEOUT_MS = 20000; // fallback: se não carregar em 12s, troca mesmo assim

    const frameA = document.getElementById("frameA");
    const frameB = document.getElementById("frameB");
    const hud = document.getElementById("hud");

    let visible = frameA;
    let hidden  = frameB;

    let currentIndex = 0;
    let lastTick = Date.now();
    let timerCountdown;

    function setVisible(frame) { frame.classList.add("visible"); }
    function setHidden(frame)  { frame.classList.remove("visible"); }

    function updateHud(screenIndex, total, secondsLeft) {
      hud.innerHTML = `<b>Tela: ${screenIndex}/${total}</b><small>Troca em: ${secondsLeft}s</small>`;
    }

    function startCountdown() {
      clearInterval(timerCountdown);
      lastTick = Date.now();
      timerCountdown = setInterval(() => {
        const elapsed = Date.now() - lastTick;
        const left = Math.max(0, Math.ceil((INTERVAL_MS - elapsed) / 1000));
        updateHud(currentIndex + 1, links.length, left);
      }, 250);
    }

    function swapFrames() {
      setVisible(hidden);
      setHidden(visible);

      setTimeout(() => {
        const tmp = visible;
        visible = hidden;
        hidden = tmp;
      }, FADE_MS);
    }

    function preloadAndSwap(nextUrl) {
      hidden.src = nextUrl;

      let swapped = false;

      const onLoad = () => {
        if (swapped) return;
        swapped = true;
        hidden.removeEventListener("load", onLoad);
        clearTimeout(fallback);
        swapFrames();
      };

      hidden.addEventListener("load", onLoad);

      const fallback = setTimeout(() => {
        if (swapped) return;
        swapped = true;
        hidden.removeEventListener("load", onLoad);
        swapFrames();
      }, LOAD_TIMEOUT_MS);
    }

    function start() {
      // Carrega a primeira e mostra
      visible.src = links[currentIndex];
      setVisible(visible);

      // Pré-carrega a próxima
      const nextIndex = (currentIndex + 1) % links.length;
      hidden.src = links[nextIndex];

      // HUD + contador
      updateHud(currentIndex + 1, links.length, Math.ceil(INTERVAL_MS / 1000));
      startCountdown();

      // Troca a cada 1 minuto
      setInterval(() => {
        // Reinicia contador
        lastTick = Date.now();
        startCountdown();

        const next = (currentIndex + 1) % links.length;

        // Troca para a próxima
        preloadAndSwap(links[next]);

        // Atualiza índice atual
        currentIndex = next;

        // Após o swap, pré-carrega a próxima da próxima
        setTimeout(() => {
          const afterNext = (currentIndex + 1) % links.length;
          hidden.src = links[afterNext];
        }, FADE_MS + 50);

      }, INTERVAL_MS);
    }

    start();
  </script>
</body>
</html>
